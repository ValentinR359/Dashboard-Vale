<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard · Vale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0;min-height:100vh;padding:1rem}
.wrap{max-width:680px;margin:0 auto}
.card{background:#1a1f2e;border:0.5px solid #2a3050;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.card2{background:#222840;border:0.5px solid #2a3050;border-radius:12px;padding:1rem 1.25rem}
.lbl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:5px 12px;font-size:12px;border-radius:8px;border:0.5px solid #2a3050;background:transparent;color:#94a3b8;cursor:pointer;font-family:inherit}
.tab.active{border:1px solid #818cf8;background:#1e2a4a;color:#818cf8;font-weight:500}
.toggle{display:flex;gap:4px;background:#222840;padding:4px;border-radius:8px;border:0.5px solid #2a3050}
.tgl-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;background:transparent;color:#64748b;cursor:pointer;font-family:inherit;text-transform:capitalize}
.tgl-btn.active{background:#2a3a6e;color:#e2e8f0;font-weight:500}
input[type=text],input[type=number],textarea{background:#222840;border:0.5px solid #2a3050;color:#e2e8f0;border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus,textarea:focus{border-color:#818cf8}
input[type=number]{width:54px}
button{font-family:inherit;cursor:pointer}
.btn-add{font-size:12px;background:#2a3a6e;border:none;color:#e2e8f0;border-radius:6px;padding:4px 10px}
.btn-save{padding:11px 0;font-size:14px;font-weight:500;border-radius:10px;border:0.5px solid #818cf8;background:#1e2a4a;color:#818cf8;width:100%}
.task-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #2a3050}
.task-text{flex:1;font-size:13px;color:#e2e8f0}
.task-text.done{text-decoration:line-through;color:#64748b}
.task-del{font-size:13px;color:#64748b;cursor:pointer;padding:0 4px;background:none;border:none}
.task-add-row{display:flex;gap:6px;margin-top:8px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.metric-card{background:#222840;border-radius:8px;padding:.875rem 1rem;text-align:center}
.metric-val{font-size:20px;font-weight:500;margin:0}
.metric-sub{font-size:11px;color:#64748b;margin:0}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.donut-label{font-size:11px;color:#94a3b8;text-align:center}
.donut-sub{font-size:10px;color:#64748b;text-align:center}
.donuts-row{display:flex;justify-content:space-around;flex-wrap:wrap;gap:16px;padding-top:8px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;font-weight:500;min-width:110px}
.bar-track{flex:1;background:#2a3050;border-radius:4px;height:10px}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-pct{font-size:12px;color:#94a3b8;min-width:34px;text-align:right}
.week-row{display:flex;align-items:center;gap:14px;padding:.875rem 1.25rem;background:#1a1f2e;border:0.5px solid #2a3050;border-radius:12px;margin-bottom:8px}
.hist-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:#222840;font-weight:500}
.section{display:none}.section.active{display:block}
.view{display:none}.view.active{display:block}
.humor-row{display:flex;gap:10px;font-size:22px}
.humor-emoji{cursor:pointer;opacity:.25;transition:opacity .15s}
.humor-emoji.sel{opacity:1}
.bloque-card{border-left:3px solid transparent;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px;border:0.5px solid #2a3050;background:#1a1f2e}
.bloque-card.active-bloque{background:#1e2a3a}
.bloque-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bloque-title{font-size:14px;font-weight:500}
.bloque-hora{font-size:12px;color:#64748b}
.ahora-badge{font-size:10px;font-weight:500;margin-left:8px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.06)}
.now-banner{display:flex;justify-content:space-between;align-items:center;border-left:3px solid;border-radius:12px;padding:10px 16px;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.nota-input{margin-top:8px;width:100%}
.msg-ok{font-size:12px;color:#4ade80;text-align:center;margin-top:6px}
.msg-err{font-size:12px;color:#f87171;text-align:center;margin-top:6px}
.hist-day{background:#222840;border-radius:8px;padding:6px 10px;text-align:center;min-width:54px}
.hist-day-date{font-size:10px;color:#64748b;margin:0 0 2px}
.hist-day-pct{font-size:16px;font-weight:500;margin:0}
.period-toggle{display:flex;gap:4px;background:#222840;padding:3px;border-radius:6px;border:0.5px solid #2a3050;width:fit-content;margin-bottom:12px}
.period-btn{font-size:11px;padding:3px 10px;border-radius:5px;border:none;background:transparent;color:#64748b;cursor:pointer;text-transform:capitalize;font-family:inherit}
.period-btn.active{background:#2a3a6e;color:#e2e8f0}
.meta-row{display:flex;align-items:center;gap:14px;padding:1rem 1.25rem;background:#1a1f2e;border:0.5px solid #2a3050;border-radius:12px;margin-bottom:10px}
.meta-edit{display:grid;gap:6px}
.meta-edit-row{display:flex;gap:8px;align-items:center}
.btn-listo{font-size:11px;background:#2a3a6e;border:none;color:#e2e8f0;border-radius:6px;padding:4px 10px;margin-left:auto}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const INTENCION={
  0:{label:"Papás",emoji:"👨‍👩‍👦",desc:"Visitar o llamar a papás",color:"#D4537E"},
  1:{label:"Amigos",emoji:"🥂",desc:"Tiempo social — trago, cine, amigos",color:"#1D9E75"},
  2:{label:"Portafolio",emoji:"📊",desc:"Revisar y organizar inversiones",color:"#378ADD"},
  3:{label:"Hijos",emoji:"👨‍👧‍👦",desc:"Tiempo con los tres",color:"#D85A30"},
  4:{label:"Libre",emoji:"◦",desc:"Sin intención fija",color:"#888780"},
  5:{label:"Libre",emoji:"◦",desc:"Sin intención fija",color:"#888780"},
  6:{label:"Papás",emoji:"👨‍👩‍👦",desc:"Visitar o llamar a papás",color:"#D4537E"},
};
const BLOQUES=[
  {id:"bienestar",label:"Ejercicio & Meditación",hora:"05:00–07:00",color:"#4ade80",area:"bienestar"},
  {id:"trading",label:"Trading",hora:"08:00–11:00",color:"#34d399",area:"trading"},
  {id:"descanso",label:"Descanso activo",hora:"11:00–15:00",color:"#94a3b8",area:"descanso"},
  {id:"ecom",label:"PickAndProfit",hora:"15:00–18:00",color:"#60a5fa",area:"ecom"},
  {id:"familia",label:"Familia / Noche",hora:"18:00–23:00",color:"#f472b6",area:"familia"},
];
const AREAS=["bienestar","trading","ecom","familia"];
const ALABELS={bienestar:"Bienestar",trading:"Trading",ecom:"PickAndProfit",familia:"Familia"};
const ACOLORS={bienestar:"#4ade80",trading:"#34d399",ecom:"#60a5fa",familia:"#f472b6"};
const DEF_TASKS={
  bienestar:["Ejercicio completado","Meditación / respiración"],
  trading:["Revisar mercado pre-apertura","Ejecutar operación","Registrar resultado"],
  descanso:["Lectura 30 min","Nap o descanso sin pantalla"],
  ecom:["Revisar métricas","Crear/optimizar producto","Atender mensajes"],
  familia:["Tiempo sin pantallas con hijos","Momento de pareja"],
};
const DEF_METAS_SEM={bienestar:{meta:"5 días con ejercicio",p:0,t:5},trading:{meta:"5 operaciones registradas",p:0,t:5},ecom:{meta:"3 nuevos productos",p:0,t:3},familia:{meta:"4 noches sin trabajo",p:0,t:4}};
const DEF_METAS_MES={bienestar:{meta:"20 días con ejercicio",p:0,t:20},trading:{meta:"Rentabilidad positiva",p:0,t:10},ecom:{meta:"10 ventas cerradas",p:0,t:10},familia:{meta:"2 salidas especiales",p:0,t:2}};
const SK="vale_v5",HK="vale_hist_v2";

function todayKey(){return new Date().toISOString().slice(0,10);}
function activeBloqueNow(){const h=new Date().getHours()+new Date().getMinutes()/60;if(h<7)return"bienestar";if(h<11)return"trading";if(h<15)return"descanso";if(h<18)return"ecom";return"familia";}
function loadState(){
  let s=null;try{s=JSON.parse(localStorage.getItem(SK));}catch{}
  const today=todayKey();
  const tasks={};[...AREAS,"descanso"].forEach(a=>{tasks[a]=DEF_TASKS[a].map((t,i)=>({id:`${a}-${i}`,text:t,done:false}));});
  const base={date:today,tasks,mSem:JSON.parse(JSON.stringify(DEF_METAS_SEM)),mMes:JSON.parse(JSON.stringify(DEF_METAS_MES)),notas:{},resumen:"",humor:{manana:0,noche:0}};
  if(!s)return base;
  if(s.date!==today)return{...base,mSem:s.mSem||base.mSem,mMes:s.mMes||base.mMes};
  return{...base,...s};
}
function loadHistory(){try{return JSON.parse(localStorage.getItem(HK))||[];}catch{return[];}}

let STATE=loadState();
let HISTORY=loadHistory();
let VIEW="ejecutivo";
let TAB="dia";
let PERIODO="semana";
let EDIT_META=null;

function save(){try{localStorage.setItem(SK,JSON.stringify(STATE));}catch{}}

function pctArea(a){const d=STATE.tasks[a]?.filter(t=>t.done).length||0,tot=STATE.tasks[a]?.length||0;return tot?Math.round((d/tot)*100):0;}
function globalPct(){const all=[...AREAS,"descanso"];const d=all.reduce((s,a)=>s+(STATE.tasks[a]?.filter(t=>t.done).length||0),0),tot=all.reduce((s,a)=>s+(STATE.tasks[a]?.length||0),0);return tot?Math.round((d/tot)*100):0;}

function donutSVG(pct,color,size,stroke){
  const r=(size-stroke*2)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=circ*(pct/100),gap=circ-dash;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a3050" stroke-width="${stroke}"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><span style="font-size:${size>70?15:12}px;font-weight:500;color:${color}">${pct}%</span></div>`;
}
function donutHTML(pct,color,size,stroke,label,sub){
  return `<div class="donut-wrap"><div style="position:relative;width:${size}px;height:${size}px">${donutSVG(pct,color,size,stroke)}</div>${label?`<span class="donut-label">${label}</span>`:""}${sub?`<span class="donut-sub">${sub}</span>`:""}</div>`;
}

function renderTasks(area){
  const tasks=STATE.tasks[area]||[];
  const color=ACOLORS[area]||"#94a3b8";
  let html=tasks.map(t=>`
    <div class="task-row">
      <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask('${area}','${t.id}')" style="accent-color:${color};width:15px;height:15px;cursor:pointer;flex-shrink:0"/>
      <span class="task-text ${t.done?'done':''}">${t.text}</span>
      <button class="task-del" onclick="removeTask('${area}','${t.id}')">×</button>
    </div>`).join("");
  html+=`<div class="task-add-row"><input type="text" id="task-input-${area}" placeholder="+ Nueva tarea" onkeydown="if(event.key==='Enter')addTaskUI('${area}')"/><button class="btn-add" onclick="addTaskUI('${area}')">+</button></div>`;
  return html;
}

function renderBloque(b){
  const isActive=b.id===activeBloqueNow();
  const tasks=renderTasks(b.area);
  const nota=STATE.notas[b.id]||"";
  return `<div class="bloque-card ${isActive?'active-bloque':''}" style="border-left:3px solid ${b.color};border-color:${isActive?b.color:'#2a3050'}">
    <div class="bloque-header">
      <div><span class="bloque-title" style="color:${b.color}">${b.label}</span>${isActive?`<span class="ahora-badge" style="color:${b.color}">AHORA</span>`:""}</div>
      <span class="bloque-hora">${b.hora}</span>
    </div>
    ${tasks}
    <input type="text" class="nota-input" value="${nota.replace(/"/g,'&quot;')}" placeholder="Nota rápida..." onchange="setNota('${b.id}',this.value)"/>
  </div>`;
}

function renderEjecutivo(){
  const hoy=new Date().getDay(),int=INTENCION[hoy],ab=BLOQUES.find(b=>b.id===activeBloqueNow()),pct=globalPct();
  const balData=AREAS.map(a=>pctArea(a));
  const metas=PERIODO==="semana"?STATE.mSem:STATE.mMes;
  return `
  <div class="card">
    <div class="lbl">Balance del día</div>
    <div class="donuts-row">
      ${donutHTML(pct,"#818cf8",90,9,"Global",`${[...AREAS,"descanso"].reduce((s,a)=>s+(STATE.tasks[a]?.filter(t=>t.done).length||0),0)}/${[...AREAS,"descanso"].reduce((s,a)=>s+(STATE.tasks[a]?.length||0),0)}`)}
      ${AREAS.map((a,i)=>donutHTML(balData[i],ACOLORS[a],72,7,ALABELS[a],`${STATE.tasks[a]?.filter(t=>t.done).length||0}/${STATE.tasks[a]?.length||0}`)).join("")}
    </div>
  </div>
  <div class="grid2">
    <div class="card" style="border-left:3px solid ${ab?.color||'#2a3050'}">
      <div class="lbl">Ahora</div>
      <div style="font-size:15px;font-weight:500;color:${ab?.color};margin-bottom:2px">${ab?.label}</div>
      <div style="font-size:12px;color:#64748b">${ab?.hora}</div>
    </div>
    <div class="card" style="border-left:3px solid ${int.color}">
      <div class="lbl">Intención</div>
      <div style="font-size:15px;font-weight:500;color:${int.color};margin-bottom:2px">${int.emoji} ${int.label}</div>
      <div style="font-size:12px;color:#64748b">${int.desc}</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="lbl" style="margin:0">Metas</div>
      <div class="period-toggle">
        <button class="period-btn ${PERIODO==='semana'?'active':''}" onclick="setPeriodo('semana')">semana</button>
        <button class="period-btn ${PERIODO==='mes'?'active':''}" onclick="setPeriodo('mes')">mes</button>
      </div>
    </div>
    <div class="donuts-row" style="margin-bottom:12px">
      ${AREAS.map(a=>{const m=metas[a],pp=m.t?Math.min(100,Math.round((m.p/m.t)*100)):0;return donutHTML(pp,ACOLORS[a],68,6,ALABELS[a],`${m.p}/${m.t}`);}).join("")}
    </div>
    ${AREAS.map(a=>`<p style="font-size:12px;color:#94a3b8;margin:0 0 4px"><span style="color:${ACOLORS[a]};font-weight:500">${ALABELS[a]}:</span> ${metas[a].meta}</p>`).join("")}
  </div>
  ${HISTORY.length>0?`<div class="card"><div class="lbl" style="margin-bottom:10px">Últimos días</div><div style="display:flex;gap:8px;flex-wrap:wrap">${HISTORY.slice(0,7).map(h=>`<div class="hist-day"><p class="hist-day-date">${h.date.slice(5)}</p><p class="hist-day-pct" style="color:${h.pct>=70?'#4ade80':h.pct>=40?'#facc15':'#f87171'}">${h.pct}%</p></div>`).join("")}</div></div>`:""}`;
}

function renderOperativo(){
  const hoy=new Date().getDay(),int=INTENCION[hoy],ab=BLOQUES.find(b=>b.id===activeBloqueNow()),pct=globalPct();
  const balData=AREAS.map(a=>pctArea(a));
  const metas=PERIODO==="semana"?STATE.mSem:STATE.mMes;
  const tabs=["dia","semana","metas","historico","cierre"];
  const tabLabels={dia:"Mi día",semana:"Semana",metas:"Metas",historico:"Histórico",cierre:"Cierre"};
  let content="";

  if(TAB==="dia"){
    const doneAll=[...AREAS,"descanso"].reduce((s,a)=>s+(STATE.tasks[a]?.filter(t=>t.done).length||0),0);
    const totAll=[...AREAS,"descanso"].reduce((s,a)=>s+(STATE.tasks[a]?.length||0),0);
    content=`<div class="metric-grid">
      <div class="metric-card"><div class="lbl">Completado</div><p class="metric-val">${pct}%</p><p class="metric-sub">${doneAll}/${totAll}</p></div>
      <div class="metric-card"><div class="lbl">Ánimo mañana</div><p class="metric-val">${STATE.humor.manana?["😑","😐","🙂","😊","🔥"][STATE.humor.manana-1]:"—"}</p></div>
      <div class="metric-card"><div class="lbl">Ánimo noche</div><p class="metric-val">${STATE.humor.noche?["😑","😐","🙂","😊","🔥"][STATE.humor.noche-1]:"—"}</p></div>
    </div>${BLOQUES.map(renderBloque).join("")}`;
  } else if(TAB==="semana"){
    content=[1,2,3,4,5,6,0].map(d=>{const int2=INTENCION[d],esHoy=d===hoy;return`<div class="week-row" style="border-left:3px solid ${esHoy?int2.color:'#2a3050'}"><div style="min-width:80px"><p style="font-size:13px;font-weight:${esHoy?500:400};margin:0;color:${esHoy?int2.color:'#e2e8f0'}">${DIAS[d]}</p>${esHoy?`<p style="font-size:10px;color:${int2.color};margin:0;font-weight:500">HOY</p>`:""}</div><span style="font-size:18px">${int2.emoji}</span><div><p style="font-size:13px;font-weight:500;margin:0;color:${int2.color}">${int2.label}</p><p style="font-size:12px;color:#64748b;margin:0">${int2.desc}</p></div></div>`;}).join("");
  } else if(TAB==="metas"){
    content=`<div class="period-toggle">${["semana","mes"].map(p=>`<button class="period-btn ${PERIODO===p?'active':''}" onclick="setPeriodo('${p}')">${p}</button>`).join("")}</div>
    ${AREAS.map(a=>{const m=metas[a],pp=m.t?Math.min(100,Math.round((m.p/m.t)*100)):0,eKey=`${PERIODO}-${a}`;
    return`<div class="meta-row">
      <div style="position:relative;width:60px;height:60px">${donutSVG(pp,ACOLORS[a],60,6)}</div>
      <div style="flex:1">
        <p style="font-size:13px;font-weight:500;margin:0 0 4px;color:${ACOLORS[a]}">${ALABELS[a]}</p>
        ${EDIT_META===eKey?`<div class="meta-edit">
          <input type="text" value="${m.meta.replace(/"/g,'&quot;')}" onblur="updateMeta('${PERIODO}','${a}','meta',this.value)" style="width:100%"/>
          <div class="meta-edit-row">
            <label style="font-size:11px;color:#64748b">Avance</label>
            <input type="number" min="0" max="${m.t}" value="${m.p}" oninput="updateMeta('${PERIODO}','${a}','p',+this.value)"/>
            <label style="font-size:11px;color:#64748b">Total</label>
            <input type="number" min="1" value="${m.t}" oninput="updateMeta('${PERIODO}','${a}','t',+this.value)"/>
            <button class="btn-listo" onclick="setEditMeta(null)">Listo</button>
          </div>
        </div>`:`<div onclick="setEditMeta('${eKey}')" style="cursor:pointer"><p style="font-size:12px;color:#64748b;margin:0 0 4px">${m.meta}</p><p style="font-size:11px;color:#94a3b8;margin:0">${m.p}/${m.t} · Toca para editar</p></div>`}
      </div>
    </div>`;}).join("")}`;
  } else if(TAB==="historico"){
    content=HISTORY.length===0?`<div class="card" style="text-align:center;padding:2rem"><p style="font-size:13px;color:#64748b">Sin registros aún. Cierra tu primer día desde Cierre.</p></div>`:
    HISTORY.map(h=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:500">${h.date}</span><span style="font-size:16px;font-weight:500;color:${h.pct>=70?'#4ade80':h.pct>=40?'#facc15':'#f87171'}">${h.pct}%</span></div><div style="display:flex;gap:6px;flex-wrap:wrap">${AREAS.map((a,i)=>`<span class="hist-badge" style="color:${ACOLORS[a]}">${ALABELS[a]} ${h.balData[i]}%</span>`).join("")}</div></div>`).join("");
  } else if(TAB==="cierre"){
    const humorEmojis=["😑","😐","🙂","😊","🔥"];
    content=`<div class="grid2">
      ${["manana","noche"].map(m=>`<div class="card"><div class="lbl">${m==="manana"?"Ánimo al despertar":"Ánimo al cerrar"}</div><div class="humor-row">${[1,2,3,4,5].map(v=>`<span class="humor-emoji ${STATE.humor[m]===v?'sel':''}" onclick="setHumor('${m}',${v})">${humorEmojis[v-1]}</span>`).join("")}</div></div>`).join("")}
    </div>
    <div class="card"><div class="lbl" style="margin-bottom:8px">Resumen del día</div><textarea rows="4" placeholder="¿Qué salió bien? ¿Qué mejorarías?" style="width:100%;resize:vertical;font-size:13px;padding:8px 10px" onchange="setResumen(this.value)">${STATE.resumen}</textarea></div>
    <div class="card"><div class="donuts-row">${donutHTML(pct,"#818cf8",80,8,"Global","")}${AREAS.map((a,i)=>donutHTML(balData[i],ACOLORS[a],64,6,ALABELS[a],"")).join("")}</div></div>
    <button class="btn-save" onclick="guardarNotion()">Guardar cierre en Notion</button>
    <div id="notion-msg"></div>`;
  }

  return `${ab?`<div class="now-banner" style="border-color:${ab.color};background:#1e2a3a;border-left:3px solid ${ab.color}"><div><div class="lbl" style="color:${ab.color}">Bloque activo</div><div style="font-size:15px;font-weight:500;color:${ab.color}">${ab.label}</div></div><span style="font-size:12px;color:#64748b">${ab.hora}</span></div>`:""}
  <div class="tabs">${tabs.map(t=>`<button class="tab ${TAB===t?'active':''}" onclick="setTab('${t}')">${tabLabels[t]}</button>`).join("")}</div>
  ${content}`;
}

function render(){
  const hoy=new Date().getDay(),int=INTENCION[hoy];
  document.getElementById("app").innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem">
    <div>
      <h2 style="font-weight:500;font-size:18px;margin:0 0 2px">Dashboard · Vale</h2>
      <p style="font-size:12px;color:#64748b;margin:0">${DIAS[hoy]}, ${new Date().toLocaleDateString("es-MX",{year:"numeric",month:"long",day:"numeric"})}</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="toggle">
        <button class="tgl-btn ${VIEW==='ejecutivo'?'active':''}" onclick="setView('ejecutivo')">ejecutivo</button>
        <button class="tgl-btn ${VIEW==='operativo'?'active':''}" onclick="setView('operativo')">operativo</button>
      </div>
      <div style="text-align:right"><span style="font-size:16px">${int.emoji}</span><p style="font-size:11px;color:${int.color};margin:1px 0 0;font-weight:500">${int.label}</p></div>
    </div>
  </div>
  ${VIEW==="ejecutivo"?renderEjecutivo():renderOperativo()}`;
}

function setView(v){VIEW=v;render();}
function setTab(t){TAB=t;render();}
function setPeriodo(p){PERIODO=p;render();}
function setEditMeta(k){EDIT_META=k;render();}

function toggleTask(area,id){
  const t=STATE.tasks[area].find(t=>t.id===id);if(t)t.done=!t.done;save();render();
}
function addTaskUI(area){
  const inp=document.getElementById(`task-input-${area}`);if(!inp||!inp.value.trim())return;
  STATE.tasks[area].push({id:`${area}-${Date.now()}`,text:inp.value.trim(),done:false});
  save();render();
}
function removeTask(area,id){STATE.tasks[area]=STATE.tasks[area].filter(t=>t.id!==id);save();render();}
function setNota(b,v){STATE.notas[b]=v;save();}
function setResumen(v){STATE.resumen=v;save();}
function setHumor(k,v){STATE.humor[k]=v;save();render();}
function updateMeta(periodo,area,field,val){
  const key=periodo==="semana"?"mSem":"mMes";
  STATE[key][area][field]=val;save();render();
}
function guardarNotion(){
  const el=document.getElementById("notion-msg");
  if(el)el.innerHTML=`<p class="msg-err">La integración con Notion requiere backend propio. Próxima versión.</p>`;
}

render();
setInterval(render,60000);
</script>
</body>
</html>
